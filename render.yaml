# Flight Monitor Web — 同一域名统一部署（exhaustive-viz + nl-search）
# 文档：https://render.com/docs/blueprint-spec
services:
  - type: web
    name: flight-monitor-web
    runtime: docker
    repo: https://github.com/sxyfe/flight-monitor
    branch: main
    dockerfilePath: ./deploy/web/Dockerfile
    dockerContext: .
    plan: free
    region: singapore
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: WEB_ROOT
        value: /nl-search
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: ROLLINGGO_API_KEY
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        sync: false
      - key: LLM_MODEL
        sync: false
      - key: BILLING_ENABLED
        value: "true"
      - key: BILLING_JWT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
