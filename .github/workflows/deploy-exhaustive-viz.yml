name: Deploy exhaustive-viz to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "web/exhaustive-viz/**"
      - "deploy/**"
      - ".github/workflows/deploy-exhaustive-viz.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/exhaustive-viz

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
