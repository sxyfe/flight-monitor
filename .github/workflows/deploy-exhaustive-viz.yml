name: Deploy exhaustive-viz to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "web/exhaustive-viz/**"
      - "deploy/**"
      - ".github/workflows/deploy-exhaustive-viz.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve data.json symlink for Pages
        run: |
          if [ -L web/exhaustive-viz/data.json ]; then
            target="$(readlink -f web/exhaustive-viz/data.json)"
            rm web/exhaustive-viz/data.json
            cp "$target" web/exhaustive-viz/data.json
          fi

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: web/exhaustive-viz
          branch: gh-pages
          clean: true
          single-commit: true
