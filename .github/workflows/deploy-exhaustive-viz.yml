name: Deploy exhaustive-viz to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "web/exhaustive-viz/**"
      - "deploy/**"
      - ".github/workflows/deploy-exhaustive-viz.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: web/exhaustive-viz
          force_orphan: true
